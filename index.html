<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MermiAİ - NEMEXULTRA</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Kamera Görüntüsü (Gizli tutacağız) */
        #input_video {
            display: none;
        }

        /* Çizim Tuvali */
        #output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* Geliştirici Mesajı Kutusu */
        #dev-message {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            z-index: 20;
            max-width: 80%;
        }

        #dev-message h2 {
            margin: 0 0 10px;
            color: #f1c40f; /* Altın Rengi */
        }

        #dev-message p {
            margin: 5px 0;
            font-size: 0.9em;
            line-height: 1.4;
        }

        #dev-message .highlight {
            color: #2ecc71; /* Yeşil (Developer Rengi) */
        }
    </style>
</head>
<body>

    <video id="input_video" autoplay playsinline></video>
    
    <canvas id="output_canvas"></canvas>

    <div id="dev-message">
        <h2>console.log("NEMEXULTRA");</h2>
        <p>Sending wishes the <span class="highlight">developer way</span>... 💻🌙</p>
        <p>Use your <span class="highlight">index finger</span> to draw.</p>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        // Tuval boyutunu ekran boyutuna eşitle
        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // El Takibi ve Çizim Ayarları
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        const drawColor = '#f1c40f'; // Altın Rengi
        const lineWidth = 10;

        // MediaPipe Hands Ayarları
        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });
        
        hands.setOptions({
            maxNumHands: 1, // Sadece tek el takibi (daha performanslı)
            modelComplexity: 1, // Mobil için orta karmaşıklık
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });
        
        hands.onResults(onResults);

        // Kamera Ayarları
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        camera.start();

        // Sonuçları İşleme ve Çizim
        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // Kamerayı çiz (İsteğe bağlı, videodaki gibi siyah arka plan için yorumda bırak)
            // canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    // İşaret parmağı ucunu bul (INDEX_FINGER_TIP = 8)
                    const indexFingerTip = landmarks[8];
                    
                    // İşaret parmağını tuvale yansıt
                    const x = indexFingerTip.x * canvasElement.width;
                    const y = indexFingerTip.y * canvasElement.height;

                    // Çizim yapma mantığı (İşaret parmağı aşağıdaysa çiz)
                    // (Bu kısım videodaki gibi karmaşık bir mantık yerine basit bir 'aşağıda' takibi yapar)
                    if (landmarks[8].y < landmarks[7].y) { // Parmağın ucu (8), eklemden (7) daha yukardaysa (ekranda aşağıda)
                        if (!isDrawing) {
                            isDrawing = true;
                            lastX = x;
                            lastY = y;
                        } else {
                            canvasCtx.beginPath();
                            canvasCtx.moveTo(lastX, lastY);
                            canvasCtx.lineTo(x, y);
                            canvasCtx.strokeStyle = drawColor;
                            canvasCtx.lineWidth = lineWidth;
                            canvasCtx.lineCap = 'round';
                            canvasCtx.stroke();
                            lastX = x;
                            lastY = y;
                        }
                    } else {
                        isDrawing = false;
                    }
                }
            }
            canvasCtx.restore();
        }
    </script>
</body>
</html>
