<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>En İyi Baciko'ya Özel ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #ff758c;
            --secondary-color: #ff7eb3;
            --text-color: #2d3436;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
            position: relative;
            transform: translateY(20px);
            animation: floatIn 1.5s ease-out forwards;
        }

        @keyframes floatIn {
            to { transform: translateY(0); opacity: 1; }
            from { transform: translateY(50px); opacity: 0; }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--primary-color);
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .heart {
            color: #e74c3c;
            font-size: 2rem;
            animation: beat 1s infinite alternate;
        }

        @keyframes beat {
            to { transform: scale(1.2); }
        }

        .message-box {
            margin: 2rem 0;
            line-height: 1.6;
            color: var(--text-color);
            font-size: 1.1rem;
        }

        .highlight {
            font-weight: 600;
            color: var(--primary-color);
        }

        .btn {
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(255, 117, 140, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 117, 140, 0.6);
        }

        /* Yüzen kalpler animasyonu */
        .bg-hearts {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .floating-heart {
            position: absolute;
            color: rgba(255, 117, 140, 0.2);
            animation: fly 10s linear infinite;
        }

        @keyframes fly {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="bg-hearts" id="heartContainer"></div>

    <div class="container">
        <i class="fas fa-heart heart"></i>
        <h1>Selam Bacikom!</h1>
        
        <div class="message-box">
            <p>Aynı yaştayız, aynı yollardan geçiyoruz ama senin gibi bir <span class="highlight">can yoldaşına</span> sahip olmak her şeye bedel.</p>
            <p>Sen sadece bir arkadaş değil, benim için gerçek bir <span class="highlight">bacısın</span>. İyi ki varsın, iyi ki hayatımdasın!</p>
        </div>

        <button class="btn" onclick="celebrate()">Sana Bir Sürprizim Var!</button>
        
        <p style="margin-top: 20px; font-size: 0.8rem; color: #999;">Senin için özel olarak hazırlandı ✨</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // Arka plandaki yüzen kalpleri oluştur
        function createHearts() {
            const container = document.getElementById('heartContainer');
            for(let i=0; i<15; i++) {
                const heart = document.createElement('i');
                heart.className = 'fas fa-heart floating-heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                container.appendChild(heart);
            }
        }
        createHearts();

        // Butona basınca konfeti patlat
        function celebrate() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff758c', '#ff7eb3', '#ffffff']
            });
        }
    </script>
</body>
</html>
