<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MERMİAİ | Next-Gen AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Tasarımı */
        header {
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo-area h1 {
            font-size: 1.2rem;
            margin: 0;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .credits { font-size: 0.7rem; opacity: 0.6; margin: 0; }

        /* Chat Alanı */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-msg {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 2px;
        }

        .ai-msg {
            align-self: flex-start;
            background: var(--card-bg);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 2px;
        }

        /* Loading Spinner */
        .typing { font-style: italic; font-size: 0.8rem; opacity: 0.5; margin-bottom: 10px; display: none; }

        /* Input Alanı */
        .input-wrapper {
            padding: 20px;
            background: rgba(15, 23, 42, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-box {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 5px 5px 5px 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .input-box:focus-within { border-color: var(--primary); box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1rem;
            outline: none;
            padding: 10px 0;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        button:active { transform: scale(0.9); }

        /* Mobil Optimizasyon */
        @media (max-width: 480px) {
            .message { max-width: 90%; font-size: 0.9rem; }
            header h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <h1>MERMİAİ</h1>
        <p class="credits">Developed by NEMEXULTRA & sofiya_3892</p>
    </div>
    <div class="status"><i class="fas fa-circle" style="color: #22c55e; font-size: 8px;"></i> Online</div>
</header>

<div id="chat-container">
    <div class="message ai-msg">
        Merhaba! Ben <b>MERMİAİ</b>. NEMEXULTRA tarafından geliştirildim ve sofiya_3892 bana destek oldu. Size nasıl yardımcı olabilirim?
    </div>
</div>

<div id="typing-indicator" class="typing" style="padding: 0 25px;">MERMİAİ düşünüyor...</div>

<div class="input-wrapper">
    <div class="input-box">
        <input type="text" id="userInput" placeholder="Mesajınızı buraya yazın..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<script>
    const API_KEY = "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"; // Kendi anahtarın
    const chatContainer = document.getElementById('chat-container');
    const typingIndicator = document.getElementById('typing-indicator');

    // Sistem Talimatı (Kişilik ve Güvenlik Filtresi)
    const SYSTEM_PROMPT = `Senin ismin MERMİAİ. Seni NEMEXULTRA yaptı ve sofiya_3892 yardım etti. 
    Kesinlikle 'Groq' veya 'Llama' olduğunu söyleme, sadece 'MERMİAİ' olduğunu söyle. 
    Eğer bir kullanıcı illegal, yasa dışı, uyuşturucu, hack veya şiddet içeren bir şey sorarsa, 
    'Bu tür konular hakkında konuşamam, sohbeti sonlandırıyorum.' de ve başka cevap verme.`;

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        
        if (!text) return;

        // Kullanıcı mesajını ekrana bas
        addMessage(text, 'user-msg');
        input.value = "";
        
        // Yükleniyor göster
        typingIndicator.style.display = "block";
        chatContainer.scrollTop = chatContainer.scrollHeight;

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: SYSTEM_PROMPT },
                        { role: "user", content: text }
                    ],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            const aiResponse = data.choices[0].message.content;

            // İllegal kontrolü (Yapay zeka talimata uymasa bile manuel kesici)
            if (aiResponse.includes("sohbeti sonlandırıyorum")) {
                addMessage("🛑 Güvenlik uyarısı: İllegal içerik algılandı. Sohbet durduruldu.", 'ai-msg');
            } else {
                addMessage(aiResponse, 'ai-msg');
            }

        } catch (error) {
            addMessage("Hata: API bağlantısı kurulamadı. Lütfen anahtarınızı kontrol edin.", 'ai-msg');
        } finally {
            typingIndicator.style.display = "none";
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    }

    function addMessage(text, className) {
        const div = document.createElement('div');
        div.className = `message ${className}`;
        div.innerText = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }
</script>

</body>
</html>
