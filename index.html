<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Instagram | @NEMEXULTRA</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="insta-nav">
        <div class="nav-container">
            <div class="logo">Instagram</div>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Ara...">
            </div>
            <div class="nav-icons">
                <i class="far fa-heart"></i>
                <i class="far fa-paper-plane"></i>
            </div>
        </div>
    </nav>

    <main class="profile-page" id="profilePage">
        
        <header class="profile-header">
            <div class="pp-container">
                <img src="profil.jpg" alt="PP" class="profile-pic">
            </div>
            <section class="profile-info">
                <div class="user-row">
                    <h2 id="usernameDisplay">sofiya_3892</h2>
                    <button class="edit-btn">Takip Et</button>
                    <i class="fas fa-cog"></i>
                </div>
                
                <div class="stats-row">
                    <span><strong>5</strong> gönderi</span>
                    <span><strong>81.2M</strong> takipçi</span>
                    <span><strong>1</strong> takip</span>
                </div>

                <div class="bio-row">
                    <span class="full-name">Canım Bacım ✨</span>
                    <p class="bio-text">CANİM BACİŞİM >3 İYKİ VARSİN MUAAHHH</p>
                </div>
            </section>
        </header>

        <div class="highlights">
            <div class="highlight-item"><div class="circle"></div><span>Baciş</span></div>
            <div class="highlight-item"><div class="circle"></div><span>Bestie</span></div>
            <div class="highlight-item"><div class="circle"></div><span>Hatıra</span></div>
        </div>

        <div class="post-tabs">
            <div class="tab active"><i class="fas fa-th"></i> GÖNDERİLER</div>
            <div class="tab"><i class="fas fa-id-badge"></i> ETİKETLENENLER</div>
        </div>

        <section class="posts-grid">
            <div class="post"><img src="foto1.jpg"></div>
            <div class="post"><img src="foto2.jpg"></div>
            <div class="post"><img src="foto3.jpg"></div>
            <div class="post"><img src="foto4.jpg"></div>
            <div class="post"><img src="foto1.jpg"></div> </section>

    </main>

    <div id="searchPlaceholder" class="placeholder-screen">
        <p>Aramak istediğiniz hesabı yazın...</p>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://raw.githubusercontent.com/nemex-cheat/MERM-/main/geemini" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
