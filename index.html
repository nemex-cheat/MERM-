<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Canım Bacıkoma Özel 🌟</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #canvas-stars {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .main-box {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 30px;
            border: 2px solid #ff0055;
            box-shadow: 0 0 30px #ff0055;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .magic-btn {
            background: #ff0055;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px #ff0055;
            margin-top: 20px;
        }

        .magic-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #ff0055;
        }

        #message-area {
            font-size: 1.8rem;
            font-weight: bold;
            height: 60px;
            margin-bottom: 20px;
            color: #00d2ff;
            text-shadow: 0 0 5px #00d2ff;
        }

        .floating-heart {
            position: absolute;
            color: #ff0055;
            font-size: 20px;
            animation: float 4s linear infinite;
            z-index: 1;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="canvas-stars"></canvas>

    <div class="main-box">
        <div id="message-area">Hoş Geldin Canım Bacım! ✨</div>
        <p>Seni üzenleri boşver, senin değerin çok büyük.</p>
        <button class="magic-btn" onclick="nextMessage()">Sürprizi Gör 🎁</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        const messages = [
            "Kimsenin seni üzmesine izin verme! 💪",
            "Sen benim için çok değerlisin, unutma! 💎",
            "Gereksiz insanlar sadece gürültü yapar. 🔇",
            "Her zaman senin yanındayım güzel bacikom. ✨",
            "Şimdi arkana yaslan ve izle... 🎉"
        ];

        let currentMsg = 0;
        const msgArea = document.getElementById('message-area');

        function nextMessage() {
            if (currentMsg < messages.length) {
                msgArea.innerHTML = messages[currentMsg];
                currentMsg++;
                createHearts();
            } else {
                msgArea.innerHTML = "Seni Çok Seviyorum Canim bacım! ❤️";
                fireConfetti();
            }
        }

        function createHearts() {
            for(let i=0; i<10; i++) {
                let heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 4000);
            }
        }

        function fireConfetti() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff0055', '#00d2ff', '#ffffff']
            });
        }

        // Arka plan yıldızları için basit animasyon
        const canvas = document.getElementById('canvas-stars');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            for(let i=0; i<100; i++) {
                ctx.beginPath();
                ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 1, 0, Math.PI*2);
                ctx.fill();
            }
        }
        setInterval(drawStars, 1000);
    </script>
</body>
</html>
