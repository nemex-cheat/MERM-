<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERMİAİ - Official Interface</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 90%;
            max-width: 800px;
            background: #1e293b;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 20px;
            background: #334155;
            text-align: center;
            border-bottom: 2px solid #3b82f6;
        }
        .header h1 { margin: 0; font-size: 24px; color: #3b82f6; }
        .header p { margin: 5px 0 0; font-size: 12px; opacity: 0.7; }

        .chat-box {
            height: 400px;
            padding: 20px;
            overflow-y: auto;
            border-bottom: 1px solid #334155;
        }
        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #334155;
            color: white;
            outline: none;
        }
        button {
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <h1>MERMİAİ</h1>
        <p>Created by NEMEXULTRA & sofiya_3892</p>
    </div>
    
    <div class="chat-box" id="chatBox">
        <p><strong>MERMİAİ:</strong> Merhaba! Ben MERMİAİ. Size nasıl yardımcı olabilirim?</p>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Mesajınızı yazın...">
        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Gönder</button>
    </div>
</div>

<script>
    function sendMessage() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chatBox');
        
        if(input.value.trim() !== "") {
            const userMsg = document.createElement('p');
            userMsg.innerHTML = `<strong>Siz:</strong> ${input.value}`;
            chatBox.appendChild(userMsg);
            
            // Buraya API bağlantısı gelecek
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }
</script>

</body>
</html>
