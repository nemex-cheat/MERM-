<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NemexUltra - Geliştirici Usulü Ramazan</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        #input_video { display: none; }
        #output_canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; transform: scaleX(-1); } /* Ayna görüntüsü */
        
        #ui-box {
            position: absolute; bottom: 30px; left: 20px;
            background: rgba(0, 255, 0, 0.1);
            padding: 20px; border-left: 5px solid #00ff00;
            z-index: 100; color: #00ff00; pointer-events: none;
        }
        .status { font-weight: bold; color: #fff; }
    </style>
</head>
<body>

    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>

    <div id="ui-box">
        <h1 style="margin:0;">> NemexUltra.exe</h1>
        <p>Sistem: <span class="status">ÇALIŞIYOR</span></p>
        <p style="color: #ffcc00;">Mesaj: Hayırlı Ramazanlar dilerim!</p>
        <p style="font-size: 0.8em; opacity: 0.7;">* Çizmek için işaret parmağını kaldır.</p>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        function resize() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        // Çizim noktalarını saklamak için dizi
        let points = [];

        function onResults(results) {
            // Arka planı temizle ama siyah yap
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.fillStyle = "black";
            canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    // İşaret parmağı ucu (8) ve eklemi (6)
                    const tip = landmarks[8];
                    const x = tip.x * canvasElement.width;
                    const y = tip.y * canvasElement.height;

                    // Eğer parmak dik duruyorsa çiz (Basit bir kontrol)
                    if (landmarks[8].y < landmarks[6].y) {
                        points.push({x, y});
                    } else {
                        points.push(null); // Çizgiyi kes
                    }
                }
            }

            // Tüm noktaları çiz
            canvasCtx.beginPath();
            canvasCtx.lineWidth = 8;
            canvasCtx.strokeStyle = "#00ff00"; // Hacker yeşili
            canvasCtx.lineCap = "round";
            canvasCtx.lineJoin = "round";

            for (let i = 1; i < points.length; i++) {
                if (points[i] && points[i-1]) {
                    canvasCtx.moveTo(points[i-1].x, points[i-1].y);
                    canvasCtx.lineTo(points[i].x, points[i].y);
                }
            }
            canvasCtx.stroke();
            canvasCtx.restore();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        camera.start();
    </script>
</body>
</html>
