<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NemexUltra - Geliştirici Usulü</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        #input_video { display: none; }
        #output_canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        
        #ui-box {
            position: absolute; bottom: 30px; left: 20px;
            background: rgba(0, 255, 0, 0.1);
            padding: 15px; border-left: 5px solid #00ff00;
            z-index: 100; color: #00ff00; pointer-events: none;
        }
    </style>
</head>
<body>

    <video id="input_video" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>

    <div id="ui-box">
        <h2 style="margin:0;">> NemexUltra.v2</h2>
        <p>Sistem: <span style="color:white">AKTİF</span></p>
        <p>Mesaj: Hayırlı Ramazanlar!</p>
        <p style="font-size: 0.7em;">* Yazmak için: İşaret Parmağı Yukarı</p>
        <p style="font-size: 0.7em;">* Taşımak için: İşaret + Orta Parmak Birleşik</p>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        let points = []; 
        let offsetX = 0; let offsetY = 0;

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Kamerayı çiz (Aynasız düz görüntü)
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    // El iskeletini çiz
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
                    drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 1, radius: 3});

                    const indexTip = landmarks[8];
                    const middleTip = landmarks[12];
                    const x = indexTip.x * canvasElement.width;
                    const y = indexTip.y * canvasElement.height;

                    // İki parmak birleşik mi? (Taşıma modu)
                    const dist = Math.hypot(indexTip.x - middleTip.x, indexTip.y - middleTip.y);
                    
                    if (dist < 0.05) {
                        // Sürükleme mantığı (Tüm noktaları kaydır)
                        offsetX = x - (points.length > 0 ? points[points.length-1]?.x || x : x);
                        offsetY = y - (points.length > 0 ? points[points.length-1]?.y || y : y);
                        points = points.map(p => p ? {x: p.x + offsetX, y: p.y + offsetY} : null);
                    } else if (landmarks[8].y < landmarks[6].y) {
                        // Yazma modu
                        points.push({x, y});
                    } else {
                        points.push(null);
                    }
                }
            }

            // Çizgileri çiz
            canvasCtx.beginPath();
            canvasCtx.lineWidth = 6;
            canvasCtx.strokeStyle = "#FFFF00"; // Sarı yazı
            canvasCtx.lineCap = "round";
            for (let i = 1; i < points.length; i++) {
                if (points[i] && points[i-1]) {
                    canvasCtx.moveTo(points[i-1].x, points[i-1].y);
                    canvasCtx.lineTo(points[i].x, points[i].y);
                }
            }
            canvasCtx.stroke();
            canvasCtx.restore();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });
        camera.start();

        function resize() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();
    </script>
</body>
</html>
